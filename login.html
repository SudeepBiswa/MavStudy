<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MavSTUDY | Login</title>
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="form.js" defer></script>
    <link rel="icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <header>
        <div class="headerText">
            <img src="images/favicon.png" id="logo">
            <a href="index.html">MavSTUDY</a>
        </div>
    </header>
    <div class="homeContainer" style="background-color: var(--darkGrey);">
        <div class="menu" style="position: relative;margin: auto;transform: none;top: auto;left: auto;z-index: 0;"div class="menu" style="position: relative;margin: 15px auto;transform: none;top: auto;left: auto;z-index: 0;">
            <div class="menuTitle">
                <h1>Login</h1>
            </div>
            <form>
                <label>Email</label>
                <input type="email" placeholder="email@unomaha.edu" id="email" required>
                <label>Password</label>
                <input type="password" placeholder="••••••••••" id="password" required>
            </form>
            <div class="menuActions" style="flex-direction: column;">
                <button id="loginButton">Login</button>
                <button id="createButton">Sign Up</button>
            </div>
            <p id="messageHandler"></p>
        </div>
    </div>
    <footer>
        <h1>Created by Alejandro, Ashita, Eduardo, Mickey, Sudeep, and Talon</h1>
    </footer>
</body>
</html>
