<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MavSTUDY | Login</title>
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="form.js" defer></script>
    <link rel="icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_circle" />
</head>
<body>
    <header>
        <div class="headerText">
            <img src="images/favicon.png" id="logo">
            <a href="index.html">MavSTUDY</a>
        </div>
    </header>
    <div class="container">
        <form>
            <h1>Login</h1>
            <label>Email</label>
            <input type="email" placeholder="email@unomaha.edu" id="email" required>
            <label>Password</label>
            <input type="password" placeholder="••••••••••" id="password" required>
            <hr>
            <input type="submit" id="loginButton" value="login">
            <input type="submit" id="createButton" value="sign up">
        </form>
        <p id="messageHandler">This is the message handler. All is good!</p>
    </div>
    <script src="script.js" defer></script>
    <footer>
        <h1>Created by Alejandro, Ashita, Eduardo, Mickey, Sudeep, and Talon</h1>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
