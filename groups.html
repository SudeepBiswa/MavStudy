<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MavSTUDY | Groups</title>
    <script type="module" src="firebase-init.js"></script>
    <script type="module" src="chats.js" defer></script>
    <link rel="icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <header>
        <div class="headerText">
            <img src="images/favicon.png" id="logo">
            <a href="index.html">MavSTUDY</a>
        </div>
        <div class="headerLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
        </div>
    </header>
    <div class="homeContainer" style="padding: 0;">
        <div class="groupsContainer">
            <div class="groupsList" id="gList">
                <template id = "groupNameTemp">
                    <div class="groupsListActiveGroup" id="inActiveChat">
                    <h1>Group Name</h1>
                </div>
                </template>
                
                <!-- <div class="groupsListGroup">
                    <h1>Group Name</h1>
                </div> -->
            </div>
            <div class="activeGroup", id="activeG">
                <div class="groupHeader">
                    <div class="groupInfo">
                        <h1>Group Name</h1>
                        <h1>4/5</h1>
                        <h1>Group Location</h1>
                        <h1>18-99</h1>
                    </div>
                    <div class="groupActions">
                        <button onclick="">Leave Group</button>
                    </div>
                </div>
                <div class="messages", id="mList">
                    <template id="recievedMsgTemp">
                        <div class="message">
                            <div class="messageContent">
                                <div class="messageSenderInfo">
                                    <h1>Sender</h1>
                                </div>
                                <h1>Short Message: Hello World!</h1>
                                <div class="messageInfo">
                                    <h1>Date & Time</h1>
                                </div>
                            </div>
                        </div>
                    </template>
                    
                    <template id = "sentMsgTemp">
                        <div class="userMessage">
                            <div class="messageContent">
                                <div class="messageSenderInfo">
                                    <h1>Sender</h1>
                                </div>
                                <h1>Long Message: Lorem ipsum Lorem ipsum, dolor sit amet consectetur adipisicing elit. Culpa explicabo, perferendis corrupti possimus repudiandae veritatis tempora aspernatur Lorem ipsum dolor sit amet consectetur adipisicing elit. Adipisci odio ut id molestiae? Quia molestias consectetur eligendi impedit velit unde odio tenetur dolorum minima deserunt, alias doloremque vitae, nobis delectus! officiis, rem, quia eum. Autem labore, est nostrum in doloribus libero tenetur quae? dolor sit amet consectetur adipisicing elit. Sint itaque recusandae in voluptatibus vitae exercitationem officia eum dolore aliquam, amet doloribus, ratione quas saepe debitis fugit molestiae earum minus qui!</h1>
                                <div class="messageInfo">
                                    <h1>Date & Time</h1>
                                </div>
                            </div>
                        </div>
                    </template>
                    
                </div>
                <div class="messageBar">
                    <input type="text" id="messageBar" placeholder="Message">
                    <button id="sendMsg"onclick="">Send</button>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <h1>Created by Alejandro, Ashita, Eduardo, Mickey, Sudeep, and Talon</h1>
    </footer>
    <!--<script src="script.js" defer></script>-->
</body>
</html>
