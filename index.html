<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MavSTUDY | Home</title>
    <script type ="module" src="form.js" defer></script>
    <link rel="icon" href="images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <div class="headerText">
            <img src="images/favicon.png" id="logo">
            <a href="index.html">MavSTUDY</a>
        </div>
    </header>
    <div class="homeContainer">
        <div class="welcomeMessage">
            <h1>Welcome, User</h1>
        </div>
        <div class="roomsViewer">
            <div class="roomsViewerMenu">
                <h1 class="selected" onclick="changeRoomsViewerMenu('all', event)">All</h1>
                <h1 onclick="changeRoomsViewerMenu('joined', event)">Joined</h1>
                <h1 onclick="changeRoomsViewerMenu('created', event)">Created</h1>
            </div>
            <div class="rooms">
                <div class="room">
                    <h1>Creator</h1>
                    <h1>1/5</h1>
                    <h1>Subject</h1>
                    <h2>View Details</h2>
                    <h2>Join</h2>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <h1>Created by Alejandro, Ashita, Eduardo, Mickey, Sudeep, and Talon</h1>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
